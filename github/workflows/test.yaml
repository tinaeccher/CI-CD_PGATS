# Ojetivo

# Desenvolver uma pipeline de integração contínua utilizando GitHub Actions para um projeto com testes automatizados, contemplando:
# - Execução por push.
# - Execução manual.
# - Execução agendada (schedule).
# - Geração de relatório de testes.
# - Armazenamento/publicação do relatório na pipeline.
# - Criação de um README explicando a solução e os conceitos utilizados.

# Preferencialmente utilizar um projeto desenvolvido em outra disciplina da pós-graduação.

# Requisitos
# - Trabalho individual.
# - Utilizar GitHub Actions.
# - Pipeline executando com sucesso.
# - Testes automatizados executando com sucesso.
# - Relatório de execução armazenado na pipeline.
# - Aplicação correta dos conceitos estudados.
# - Uso adequado das ferramentas escolhidas.
# - Documentação completa no README.

name: pipeline-de-testes # Nome da pipeline (workflow) no GitHub Actions

on: #
  push:
    branches: 
     - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

      schedule:
        - cron: '0 8,20 * * 1,2,3,4,5' # Executa de segunda a sexta-feira às 8h e 20h

jobs:
  test: # Nome do job
    runs-on: ubuntu-latest # Ambiente de execução (Ubuntu mais recente)
    steps: # Passos a serem executados no job

      - name: Checkout codigo fonte # Passo para fazer checkout do código-fonte do repositório (clone no projeto)
        uses: actions/checkout@v4 # Ação do GitHub para fazer checkout do código do repositório 
        
      - name: Configuracao do Node.js # Passo para instalar e configurar o ambiente Node.js
        uses: actions/setup-node@v6 # Ação do GitHub para configurar o ambiente Node.js
        with:
          node-version: 24.x # Especifica a versão do Node.js a ser instalada
          cache: 'npm' # Habilita o cache para as dependências do npm, melhorando a performance em execuções subsequentes

      - name: Instalar dependencias # Passo para instalar as dependências do projeto
        run: npm ci # Comando para instalar as dependências do projeto de forma limpa, garantindo que o ambiente esteja consistente com o package-lock.json 

      - name: Executar os testes # Passo para executar os testes automatizados
        run: npm test # Comando para executar os testes definidos no package.json
        
      - name: Gerar relatorio de testes # Passo para gerar o relatório de testes
        run: npm run test:report # Comando para gerar o relatório de testes (deve estar definido no package.json)

      - name: Publicar relatorio de testes # Passo para publicar o relatório de testes como artefato da pipeline
        uses: actions/upload-artifact@v7 # Ação do GitHub para fazer upload de artefatos
        with: 
          name: Relatorio de Testes Mochawesome # Nome do artefato (relatório de testes)
          path: mochawesome-report # Caminho para o diretório onde o relatório de testes foi gerado (deve ser consistente com a configuração do mochawesome)
          retention-days: 7 # Define o tempo de retenção do artefato (em dias) antes de ser excluído automaticamente
